prompt: 'Two utility helpers in the boltons library are not behaving as documented
  by their usage examples.


  The first helper, `update_wrapper(wrapper, func, injected, expected, build_from,
  **kw)` in `boltons/funcutils.py`, is intended to transfer identifying metadata from
  a source function onto a wrapper function so that the wrapper appears equivalent
  to the original. Currently, exercising this helper produces an incorrect result:
  the metadata that should be carried over to the wrapper does not match what is expected.


  The second helper, `complement(wrapped)` in `boltons/setutils.py`, is expected to
  be available as part of the public interface.


  The solver must ensure `update_wrapper` yields the correct, expected result when
  applied, matching the observable metadata/behavior of the source it is built from.'
requirements:
- Applying update_wrapper to transfer metadata from a source function to a wrapper
  produces the correct expected result rather than an incorrect one, so the wrapper
  reflects the source's identifying metadata.
interface: 'Expected interface (implement these public symbols; signatures only -
  bodies are up to you):

  # boltons/funcutils.py

  - def update_wrapper(wrapper, func, injected, expected, build_from, **kw)  [function]  (boltons/funcutils.py)

  # boltons/setutils.py

  - def complement(wrapped)  [function]  (boltons/setutils.py)'
